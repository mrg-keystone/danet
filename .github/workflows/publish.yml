name: Publish to JSR

# Publishes to JSR on every push to main, authenticating with the JSR_TOKEN repo secret.
# Idempotent: if the version in deno.json is already on JSR, it skips (so pushes without a
# version bump stay green). To cut a release, bump "version" in deno.json and push to main.
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish to JSR (skips if the version is already published)
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: |
          VERSION="$(grep '"version"' deno.json | head -1 | sed -E 's/.*"version": *"([^"]+)".*/\1/')"
          if curl -fsSL "https://jsr.io/@mrg-keystone/danet/meta.json" | grep -q "\"$VERSION\""; then
            echo "v$VERSION is already on JSR — skipping publish."
          else
            echo "Publishing v$VERSION to JSR..."
            deno publish --token "$JSR_TOKEN"
          fi
